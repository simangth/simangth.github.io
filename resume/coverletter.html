<!DOCTYPE html>
<html>

<head>
  <title>Siwan Kim’s Cover Letter</title>
  <base target="_blank"/>
  <meta name="description" content=“Siwan Kim’s Cover Letter"/>
  <meta name="author" content="Siwan Kim">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <link rel="stylesheet" href="//netdna.bootstrapcdn.com/bootstrap/3.0.0/css/bootstrap.min.css"/>
  <style>
    @import url(//fonts.googleapis.com/css?family=Gudea);
    html,
    body {
      font-family: Gudea, HelveticaNeue-Light, 'Helvetica Neue Light', 'Helvetica Neue', Helvetica, Arial, 'Lucida Grande', sans-serif;
      font-size: 1em;
      height: 100%;
    }
    body {
      background: #2A2E39;
    }
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      margin-top: 15px;
      margin-bottom: 5px;
    }
    a {
      color: inherit;
    }
    .page-break {
      page-break-after: always;
    }
    .page-header {
      margin: 20px 0 10px;
      padding-bottom: 5px;
    }
    .text-highlight {
      background-color: #ffff99;
      color: #000099;
    }
    #print {
      color: #999;
    }
    #print a:hover,
    #print a:focus {
      text-decoration: none;
    }
    #print .glyphicon {
      float: right;
      font-size: 20px;
      right: 15px;
      top: 15px;
    }
    #header {
      margin-bottom: 25px;
    }
    #header h1 {
      font-weight: bold;
      margin: 0 0 10px;
    }
    #header .aboutme {
      font-size: 1.3em;
      margin-bottom: 17px;
    }
    #header .contact a {
      background: #fff;
      border: 1px dashed #aaa;
      font-size: 0.9em;
      padding: 5px 15px;
    }
    #header .contact .col-sm-4 {
      padding: 0;
    }
    #header .contact a:hover,
    #header .contact a:focus {
      background: #f3f3ff;
    }
    #career-objective ul {
      padding-left: 20px;
    }
    #career-objective ul li {
      margin: 0.75em 0;
    }
    #awards-scholarships h5 {
      font-weight: normal;
      font-size: 1em;
    }
    #footer {
      border-top: 1px dashed #ccc;
      font-size: 0.85em;
      margin-top: 30px;
      padding-top: 10px;
    }
    @media print {
      html,
      body {
        font-size: 0.9em;
      }
      h3 {
        font-size: 18px;
      }
      a[href]:after {
        content: '';
      }
      .text-highlight {
        font-style: oblique;
      }
      #header .well {
        padding: 15px;
      }
      .text-muted {
        color: #999 !important;
      }
    }
    @media screen {
      body > .container {
        min-height: 100%;
        padding: 30px 0;
      }
      body > .container > .row > div {
        background: #fff;
        height: 100%;
        padding: 30px;
      }
      a {
        border-bottom: 1px dotted #c09853;
      }
      .no-border-bottom {
        border-bottom: none;
      }
      #content h5 {
        font-size: 1.15em;
      }
    }
    @media (max-width: 767px) {
      body > .container {
        padding-top: 0;
        padding-bottom: 0;
      }
      #header .contact {
        margin: -15px 0;
      }
      #header .contact > div {
        margin: 15px 0;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="row">
      <div class="col-sm-10 col-sm-offset-1 col-md-8 col-md-offset-2">

        <div id="header">
	  <div id="print" class="hidden-print">
            <a href="javascript:print();"><span class="glyphicon glyphicon-print"></span></a>
          </div>
          <div class="well text-center">
            <h1>SIWAN KIM</h1>
            <div class="hidden-print row contact text-center">
              <div class="col-sm-12">
                <span class="glyphicon glyphicon-envelope"></span> simangth@gmail.com<br>
		<span class="glyphicon glyphicon-phone"></span> +852-6921-9191
	      </div>
            </div>
	    <div class="visible-print row contact text-center">
              <div class="col-xs-12">
                <span class="glyphicon glyphicon-envelope"></span> simangth@gmail.com<br>
                <span class="glyphicon glyphicon-phone"></span> +852-6921-9191
              </div>
            </div>
          </div>
        </div>

        <div id="content">
          <div id="letter-start" class="section">
            <div class="page-header">
              <h4>Motif Investing Inc.</h3>
            </div>
            <div class="section-item">
            <p>Dear Sir or Madam:</p>
	    <p>This letter is in response to your posting for the Server Engineer in San Mateo.</p>
            </div>
          </div>

        <div id="footer">
          <div class="pull-right">
	    <a href="mailto:simangth@gmail.com" class="no-border-bottom"><span class="glyphicon glyphicon-envelope"></span> simangth@gmail.com</a>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="//cdnjs.cloudflare.com/ajax/libs/lodash.js/2.0.0/lodash.min.js"></script>
  <script src="//cdnjs.cloudflare.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
  <script src="//netdna.bootstrapcdn.com/bootstrap/3.0.0/js/bootstrap.min.js"></script>
  <script src="//cdnjs.cloudflare.com/ajax/libs/moment.js/2.4.0/moment.min.js"></script>
  <script>
    // Application
    (function () {
      var lastModified = moment.utc(document.lastModified + ' Z')
                               .zone(moment().zone())
                               .format('MMMM D, YYYY');
      $(function () {
        $('#last-updated').html(lastModified).parent().removeClass('hidden');
      });
    })();
  </script>
</body>

</html>
